# -- Site Configuration --
# Reference: https://blowfish.page/docs/getting-started/

baseURL = "https://ihabnk.org/"
languageCode = "ar"
title = "موقعي الجديد"
theme = "blowfish"

defaultContentLanguage = "ar"
defaultContentLanguageInSubdir = false
disableLanguages = []

# pluralizeListTitles = true

enableRobotsTXT = true
summaryLength = 30
hasCJKLanguage = false

buildDrafts = false
buildFuture = false

enableEmoji = true

googleAnalytics = ""

[pagination]
  pagerSize = 10

[imaging]
  anchor = "Center"

[taxonomies]
  tag = "tags"
  category = "categories"
  author = "authors"
  series = "series"

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[outputs]
  home = ["HTML", "RSS", "JSON"]

[related]
  threshold = 0
  toLower = false

  [[related.indices]]
    name = "tags"
    weight = 100

  [[related.indices]]
    name = "categories"
    weight = 100

  [[related.indices]]
    name = "series"
    weight = 50

  [[related.indices]]
    name = "authors"
    weight = 20

  [[related.indices]]
    name = "date"
    weight = 10

  [[related.indices]]
    name = "fragmentrefs"
    type = "fragments"
    applyFilter = false
    weight = 10

[segments]
  [segments.core]
    [[segments.core.includes]]
      path = "{/,/docs,/docs/**,/samples,/samples/**}"
